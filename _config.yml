# Configuración del Sitio - Proyecto Negocios (SISE Ciclo 6-2)
title: Forward Vision  # Cambia esto por el nombre de tu empresa
email: filber@tu-correo.com
description: >-
  Soluciones de internet de alta velocidad y fibra óptica para conectar tu mundo. 
  Proyecto desarrollado para el curso de Negocios en SISE.

# CONFIGURACIÓN CRÍTICA PARA GITHUB PAGES
baseurl: "/Negocios" # IMPORTANTE: Debe coincidir con el nombre de tu repo
url: "https://siseFilber.github.io" 

# Configuración de Usuario
twitter_username: siseFilber
github_username:  siseFilber

# Configuración de Construcción
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag # Añadido para mejorar el posicionamiento en buscadores

# Ajustes del Tema Minima
minima:
  date_format: "%b %-d, %Y"
  social_links:
    - { platform: github, user: siseFilber }
    # Puedes añadir más como facebook o instagram aquí

# Exclusiones
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/